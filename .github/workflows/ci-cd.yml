name: Postify CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

concurrency:
  group: postify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  BACKEND_IMAGE: postify-backend:staging
  FRONTEND_IMAGE: postify-frontend:staging

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Postify-dbms-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Postify-dbms-backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check app.js
          node --check server.js
          node --check middlewares/metrics.middleware.js
          node --check test/smoke.test.js

      - name: Run backend tests
        run: npm test

      - name: NPM vulnerability audit
        run: npm audit --audit-level=low  

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Postify-dbms-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Postify-dbms-frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: NPM vulnerability audit
        run: npm audit --audit-level=low

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
    if: ${{ vars.SONAR_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE ./Postify-dbms-backend

      - name: Build frontend image
        run: docker build -t $FRONTEND_IMAGE ./Postify-dbms-frontend

      - name: Save images for security and staging jobs
        run: |
          mkdir -p artifacts
          docker save $BACKEND_IMAGE -o artifacts/backend-image.tar
          docker save $FRONTEND_IMAGE -o artifacts/frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-images
          path: artifacts/*.tar
          retention-days: 1

  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-images
          path: artifacts

      - name: Load images
        run: |
          docker load -i artifacts/backend-image.tar
          docker load -i artifacts/frontend-image.tar

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload backend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  staging:
    name: Local Staging Deployment
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - security-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-images
          path: artifacts

      - name: Load staging images
        run: |
          docker load -i artifacts/backend-image.tar
          docker load -i artifacts/frontend-image.tar

      - name: Create staging environment file
        run: |
          printf '%s\n' \
            'SERVER_PORT=5000' \
            'DB_HOST=db' \
            'DB_USER=root' \
            'DB_PASSWORD=postify_staging_password' \
            'DB_DATABASE=blog' \
            'MYSQL_ROOT_PASSWORD=postify_staging_password' \
            'MYSQL_DATABASE=blog' \
            'JWT_SECRET_KEY=staging-ci-secret' \
            > .env

      - name: Start staging stack with monitoring
        run: docker compose up -d --build

      - name: Wait for staging services
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/healthz \
              && curl -fsS http://127.0.0.1:5000/metrics \
              && curl -fsS http://127.0.0.1:3000 \
              && curl -fsS http://127.0.0.1:9090/-/ready \
              && curl -fsS http://127.0.0.1:3001/api/health; then
              exit 0
            fi
            docker compose ps
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Staging smoke check
        run: |
          docker compose exec -T db sh -c 'mariadb -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" -e "SELECT COUNT(*) FROM posts;"'
          curl -fsS http://127.0.0.1:5000/healthz
          curl -fsS http://127.0.0.1:5000/api/post | grep 'Posts fetched successfully'
          curl -fsS http://127.0.0.1:3000 | grep '<div id="root"></div>'
          curl -fsS http://127.0.0.1:5000/metrics | grep postify_backend_info
          curl -fsS http://127.0.0.1:9090/api/v1/targets | grep postify-backend
          curl -fsS http://127.0.0.1:3001/api/health | grep ok

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push staging images to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_GHCR="ghcr.io/${OWNER}/postify-backend"
          FRONTEND_GHCR="ghcr.io/${OWNER}/postify-frontend"

          docker tag "$BACKEND_IMAGE" "$BACKEND_GHCR:latest"
          docker tag "$BACKEND_IMAGE" "$BACKEND_GHCR:${GITHUB_SHA}"
          docker tag "$FRONTEND_IMAGE" "$FRONTEND_GHCR:latest"
          docker tag "$FRONTEND_IMAGE" "$FRONTEND_GHCR:${GITHUB_SHA}"

          docker push "$BACKEND_GHCR:latest"
          docker push "$BACKEND_GHCR:${GITHUB_SHA}"
          docker push "$FRONTEND_GHCR:latest"
          docker push "$FRONTEND_GHCR:${GITHUB_SHA}"

      - name: Capture staging logs
        if: always()
        run: docker compose logs > staging-logs.txt

      - name: Upload staging logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-compose-logs
          path: staging-logs.txt
          retention-days: 7

      - name: Stop staging stack
        if: always()
        run: docker compose down -v
